name: Claude Interactive Cron

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      custom_prompt:
        description: 'Custom prompt (leave empty for default)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  interactive-claude:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tmux jq

      - name: Install Claude Code
        run: |
          npm install -g @anthropic-ai/claude-code@latest
          claude --version

      - name: Configure Claude auth and bypass all dialogs
        env:
          CLAUDE_ONBOARDING_JSON: ${{ secrets.CLAUDE_ONBOARDING_JSON }}
        run: |
          echo "$CLAUDE_ONBOARDING_JSON" > ~/.claude.json
          mkdir -p ~/.claude
          echo '{"skipDangerousModePermissionPrompt": true}' > ~/.claude/settings.json
          echo "Auth and onboarding configured"

      - name: Build prompt
        id: prompt
        run: |
          CUSTOM="${{ github.event.inputs.custom_prompt }}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          RUN_NUMBER="${{ github.run_number }}"

          if [ -n "$CUSTOM" ]; then
            PROMPT="$CUSTOM"
          else
            PROMPT="Do the following tasks using your tools: 1) Run 'uname -a' and 'date' in bash to get system info. 2) Run 'ls -la' to see the repo contents. 3) Read README.md and count how many lines it has. 4) Create a file called REPORT.md with a brief report containing: the system info, the file listing, the README line count, and a timestamp. 5) Append a line to log.txt with 'Run #${RUN_NUMBER} — ${TIMESTAMP} — [tool-generated entry]'. Do all of this autonomously."
          fi

          echo "$PROMPT" > /tmp/claude-prompt.txt
          echo "prompt_file=/tmp/claude-prompt.txt" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code interactively via tmux
        env:
          TERM: xterm-256color
          ANTHROPIC_API_KEY: ""
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          IS_SANDBOX: "1"
        run: |
          set +e

          SESSION="claude-ci-$$"
          PROMPT=$(cat "${{ steps.prompt.outputs.prompt_file }}")
          TIMEOUT=180

          tmux new-session -d -s "$SESSION" -x 200 -y 50 \
            "cd $GITHUB_WORKSPACE && export CLAUDE_CODE_OAUTH_TOKEN='${CLAUDE_CODE_OAUTH_TOKEN}' && export IS_SANDBOX=1 && claude --dangerously-skip-permissions --verbose; bash"

          echo "Waiting for Claude Code..."
          sleep 10
          INIT_WAIT=10
          while [ $INIT_WAIT -lt 90 ]; do
            BUFFER=$(tmux capture-pane -t "$SESSION" -p 2>/dev/null || true)

            # Handle trust dialog — send "1" (Yes, I trust)
            if echo "$BUFFER" | grep -q "trust this folder"; then
              echo "Trust dialog detected — accepting..."
              tmux send-keys -t "$SESSION" "1" C-m
              sleep 5
              INIT_WAIT=$((INIT_WAIT + 5))
              continue
            fi

            # Handle bypass permissions confirmation — send "2" (Yes, I accept)
            if echo "$BUFFER" | grep -q "Yes, I accept"; then
              echo "Bypass permissions dialog — accepting..."
              tmux send-keys -t "$SESSION" "2" C-m
              sleep 5
              INIT_WAIT=$((INIT_WAIT + 5))
              continue
            fi

            # Ready to go
            if echo "$BUFFER" | grep -qE '(Enter a prompt|tips:|bypass permissions on)'; then
              echo "Claude Code is ready (after ${INIT_WAIT}s)"
              break
            fi

            # Login wizard = onboarding bypass failed
            if echo "$BUFFER" | grep -q "Select login method"; then
              echo "::error::Login wizard appeared — onboarding bypass failed"
              tmux capture-pane -t "$SESSION" -p
              tmux kill-session -t "$SESSION" 2>/dev/null || true
              exit 1
            fi

            sleep 3
            INIT_WAIT=$((INIT_WAIT + 3))
          done

          if [ $INIT_WAIT -ge 60 ]; then
            echo "::warning::Claude Code took too long to initialize"
            tmux capture-pane -t "$SESSION" -p
            tmux kill-session -t "$SESSION" 2>/dev/null || true
            exit 1
          fi

          echo "Sending prompt..."
          tmux send-keys -t "$SESSION" "$PROMPT"
          sleep 0.3
          tmux send-keys -t "$SESSION" C-m

          echo "Waiting for Claude Code to complete..."
          ELAPSED=0
          LAST_HASH=""
          STABLE=0

          while [ $ELAPSED -lt $TIMEOUT ]; do
            sleep 3
            ELAPSED=$((ELAPSED + 3))

            BUFFER=$(tmux capture-pane -t "$SESSION" -p 2>/dev/null || true)
            CURRENT_HASH=$(echo "$BUFFER" | md5sum | cut -d' ' -f1)

            if [ "$CURRENT_HASH" = "$LAST_HASH" ]; then
              STABLE=$((STABLE + 1))
              if [ $STABLE -ge 4 ]; then
                echo "Output stable for 12s — Claude Code appears done (${ELAPSED}s total)"
                break
              fi
            else
              STABLE=0
            fi
            LAST_HASH="$CURRENT_HASH"

            if [ $((ELAPSED % 15)) -eq 0 ]; then
              echo "  ... still working (${ELAPSED}s)"
            fi
          done

          echo "=== Final tmux buffer ==="
          tmux capture-pane -t "$SESSION" -p -S -200 | tee /tmp/claude-output.txt
          echo "========================="

          tmux send-keys -t "$SESSION" "/exit" C-m
          sleep 2
          tmux kill-session -t "$SESSION" 2>/dev/null || true

          if git diff --quiet log.txt REPORT.md 2>/dev/null; then
            echo "::warning::log.txt was not modified"
            echo "result=failure" >> "$GITHUB_ENV"
          else
            echo "=== log.txt content ==="
            cat log.txt
            echo "========================"
            echo "result=success" >> "$GITHUB_ENV"
          fi

      - name: Commit changes
        if: env.result == 'success'
        run: |
          git config user.name "claude-interactive-bot"
          git config user.email "bot@example.com"
          git add log.txt REPORT.md 2>/dev/null || git add log.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "log: entry added by interactive Claude session (run #${{ github.run_number }})"
            git push
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-session-logs
          path: /tmp/claude-output.txt
          retention-days: 7
